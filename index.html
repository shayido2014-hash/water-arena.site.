<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Goal - ניהול</title>
    <script>
        // בדיקה אוטומטית אם המשתמש הוא מנהל כשהדף עולה
        window.onload = function() {
            if (localStorage.getItem('isAdmin') === 'true') {
                showAdminPanel();
            }
        };

        function checkAdmin() {
            const code = document.getElementById('admin-code').value;
            if (code === '2014') {
                localStorage.setItem('isAdmin', 'true');
                showAdminPanel();
            } else {
                alert('קוד שגוי!');
            }
        }

        function showAdminPanel() {
            document.getElementById('admin-area').style.display = 'block';
            document.getElementById('login-area').style.display = 'none';
        }

        function logout() {
            localStorage.removeItem('isAdmin');
            location.reload();
        }
    </script>
</head>
<body>
    <div id="login-area">
        <h1>כניסת מנהל</h1>
        <input type="password" id="admin-code" placeholder="הכנס קוד מנהל">
        <button onclick="checkAdmin()">כניסה</button>
    </div>

    <div id="admin-area" style="display:none;">
        <h1>אזור ניהול - פעיל</h1>
        <button onclick="logout()">יציאה מהניהול</button>
        <!-- כאן תוכל להוסיף את שאר התוכן של האתר שלך -->
    </div>
</body>
</html>
